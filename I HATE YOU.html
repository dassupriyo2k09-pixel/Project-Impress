<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP & Three.js Particle Heart Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0f19;
        }
        canvas {
            display: block;
        }
        svg {
            display: none; /* Keeps the source path hidden from view */
        }
    </style>
</head>
<body>

    <svg viewBox="0 0 600 552">
        <path d="M300,120 C300,40 160,40 160,160 C160,280 300,380 300,480 C300,380 440,280 440,160 C440,40 300,40 300,120 Z"/>
    </svg>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>
        // --- Three.js Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 500;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Exact Code From Image ---
        /* PARTICLES */
        // Create a global gsap timeline that contains all tweens
        const tl = gsap.timeline({
            repeat: -1,
            yoyo: true
        });

        const path = document.querySelector("path");
        const length = path.getTotalLength();
        const vertices = [];
        
        for (let i = 0; i < length; i += 0.1) {
            const point = path.getPointAtLength(i);
            const vector = new THREE.Vector3(point.x, -point.y, 0);
            
            vector.x += (Math.random() - 0.5) * 30;
            vector.y += (Math.random() - 0.5) * 30;
            vector.z += (Math.random() - 0.5) * 70;
            vertices.push(vector);
            
            // Create a tween for that vector
            tl.from(vector, {
                x: 600 / 2, // Center X of the heart
                y: -552 / 2, // Center Y of the heart
                z: 0, // Center of the scene
                ease: "power2.inOut",
                duration: "random(2, 5)" // Random duration
            },
            i * 0.002 // Delay calculated from the distance along the path
            );
        }

        // --- Connecting GSAP Vectors to Three.js Visuals ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(vertices.length * 3);
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // Particle Material Configuration
        const material = new THREE.PointsMaterial({
            color: 0xff3366, // Hot pink/red particles
            size: 3,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        
        // Offset the system position to center the SVG coordinates in the viewer viewport
        particleSystem.position.set(-300, 276, 0); 
        scene.add(particleSystem);

        // --- Animation & Render Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Continuously stream the GSAP-mutated vector coordinates into the WebGL Buffer
            const posAttribute = geometry.attributes.position;
            for (let i = 0; i < vertices.length; i++) {
                posAttribute.setXYZ(i, vertices[i].x, vertices[i].y, vertices[i].z);
            }
            posAttribute.needsUpdate = true; // Signal Three.js to redraw with updated positions

            renderer.render(scene, camera);
        }
        animate();

        // Responsive window scaling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
